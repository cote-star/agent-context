name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes for this tag
        id: notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Pull the ## vX.Y.Z section out of RELEASE_NOTES.md
          awk -v tag="$TAG_NAME" '
            $0 ~ "^## "tag" " { in_section = 1; next }
            in_section && /^## v[0-9]/ { exit }
            in_section { print }
          ' RELEASE_NOTES.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "No matching '## $TAG_NAME' section in RELEASE_NOTES.md" >&2
            echo "See RELEASE_NOTES.md — tag $TAG_NAME not found" > release-body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          draft: false
          prerelease: false
