<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Same Navigation Design, Opposite Behavior</title>
  <desc id="desc">A minimal comparison showing that the same repo-local navigation design reduced files opened for Claude in Beacon Web's state-reset lookup while increasing files opened for Codex in Atlas Models' parameter-threading planning task.</desc>

  <rect width="1200" height="620" fill="#ffffff"/>

  <text x="70" y="78" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#111111">
    Same Navigation Design, Opposite Behavior
  </text>
  <text x="70" y="112" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#444444">
    Representative runs using the same repo-local navigation design
  </text>

  <line x1="70" y1="138" x2="1130" y2="138" stroke="#d0d0d0" stroke-width="2"/>

  <rect x="70" y="170" width="500" height="320" rx="8" fill="#ffffff" stroke="#cfcfcf" stroke-width="2"/>
  <rect x="630" y="170" width="500" height="320" rx="8" fill="#ffffff" stroke="#cfcfcf" stroke-width="2"/>

  <text x="320" y="216" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#111111">
    Claude
  </text>
  <text x="880" y="216" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#111111">
    Codex
  </text>

  <text x="320" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6b7280">
    Beacon Web / state-reset lookup
  </text>
  <text x="880" y="252" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6b7280">
    Atlas Models / parameter-threading plan
  </text>

  <text x="320" y="345" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#111111">
    14 -> 4
  </text>
  <text x="880" y="345" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#111111">
    3 -> 12
  </text>

  <text x="320" y="390" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#5b5b5b">
    files opened
  </text>
  <text x="880" y="390" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#5b5b5b">
    files opened
  </text>

  <line x1="110" y1="414" x2="530" y2="414" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="670" y1="414" x2="1090" y2="414" stroke="#e5e7eb" stroke-width="2"/>

  <text x="320" y="447" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#6b7280">
    Effect in these runs:
  </text>
  <text x="880" y="447" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#6b7280">
    Effect in these runs:
  </text>

  <text x="320" y="478" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="700" fill="#111111">
    compresses the search space
  </text>
  <text x="880" y="478" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="700" fill="#111111">
    expands the proof burden
  </text>

  <line x1="70" y1="530" x2="1130" y2="530" stroke="#d0d0d0" stroke-width="2"/>

  <text x="600" y="576" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#5b5b5b">
    On Atlas Models' adjacent blast-radius impact analysis, Codex also expanded from 9 -> 24 files after more structure was added.
  </text>
</svg>
