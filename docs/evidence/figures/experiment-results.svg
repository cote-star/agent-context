<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="840" viewBox="0 0 1280 840" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3. Context-Pack Results Across Tasks and Repos</title>
  <desc id="desc">A hybrid figure combining representative task-level comparisons with cross-repo aggregate improvements in correctness, token efficiency, dead ends, and risk flags.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .panel { fill: #ffffff; stroke: #d7dce8; stroke-width: 2; }
      .caption { font: 700 32px Arial, sans-serif; fill: #17233a; }
      .label { font: 700 22px Arial, sans-serif; fill: #17233a; }
      .body { font: 15px Arial, sans-serif; fill: #31425f; }
      .small { font: 14px Arial, sans-serif; fill: #58667f; }
      .bare { fill: #d95f5f; }
      .pack { fill: #3666d6; }
      .structured { fill: #8c6dd7; }
      .good { fill: #1f8a70; }
      .grid { stroke: #e3e7f0; stroke-width: 1; }
      .num { font: 700 34px Arial, sans-serif; fill: #17233a; }
      .tableHead { font: 700 14px Arial, sans-serif; fill: #17233a; }
      .tableText { font: 14px Arial, sans-serif; fill: #31425f; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="840"/>
  <text class="caption" x="70" y="78">Figure 3. Context-Pack Results Across Tasks and Repos</text>
  <text class="small" x="70" y="112">Representative task-level contrasts show non-monotonic harness behavior, while cross-repo aggregates show large gains in correctness, token efficiency, and risk reduction.</text>

  <rect class="panel" x="70" y="160" width="560" height="610" rx="24"/>
  <text class="label" x="105" y="210">Representative task-level contrasts</text>

  <line class="grid" x1="105" y1="255" x2="595" y2="255"/>
  <line class="grid" x1="105" y1="325" x2="595" y2="325"/>
  <line class="grid" x1="105" y1="425" x2="595" y2="425"/>
  <line class="grid" x1="105" y1="525" x2="595" y2="525"/>
  <line class="grid" x1="105" y1="625" x2="595" y2="625"/>
  <line class="grid" x1="285" y1="255" x2="285" y2="675"/>
  <line class="grid" x1="430" y1="255" x2="430" y2="675"/>

  <text class="tableHead" x="105" y="242">Task</text>
  <text class="tableHead" x="305" y="242">Condition</text>
  <text class="tableHead" x="452" y="242">Observed result</text>

  <text class="tableText" x="105" y="290">Claude L1 lookup</text>
  <text class="tableText" x="305" y="290">Bare</text>
  <text class="tableText" x="452" y="290">14 files, 9 dead ends</text>
  <text class="tableText" x="305" y="312">Context-pack</text>
  <text class="tableText" x="452" y="312">4 files, 0 dead ends</text>

  <text class="tableText" x="105" y="390">Codex H1 planning</text>
  <text class="tableText" x="305" y="390">Bare</text>
  <text class="tableText" x="452" y="390">3 files opened</text>
  <text class="tableText" x="305" y="412">Context-pack</text>
  <text class="tableText" x="452" y="412">12 files opened</text>

  <text class="tableText" x="105" y="490">Codex M1 impact</text>
  <text class="tableText" x="305" y="490">Context-pack</text>
  <text class="tableText" x="452" y="490">9 files, 2 dead ends</text>
  <text class="tableText" x="305" y="512">Structured layer</text>
  <text class="tableText" x="452" y="512">24 files, 6 dead ends</text>

  <text class="body" x="105" y="575">Interpretation:</text>
  <text class="body" x="105" y="607">The same context intervention can reduce wasted navigation for Claude</text>
  <text class="body" x="105" y="635">while increasing proof-seeking exploration for Codex. More structure is not</text>
  <text class="body" x="105" y="663">automatically better; it changes the operating loop.</text>

  <rect x="105" y="700" width="18" height="18" rx="4" class="bare"/>
  <text class="tableText" x="133" y="714">Bare</text>
  <rect x="205" y="700" width="18" height="18" rx="4" class="pack"/>
  <text class="tableText" x="233" y="714">Context-pack</text>
  <rect x="365" y="700" width="18" height="18" rx="4" class="structured"/>
  <text class="tableText" x="393" y="714">Structured markdown + JSON</text>

  <rect class="panel" x="670" y="160" width="540" height="610" rx="24"/>
  <text class="label" x="705" y="210">Cross-repo aggregate results</text>
  <text class="small" x="705" y="236">Three repos: ML pipeline (501 files), CLI library (155 files), React frontend (1,982 files)</text>

  <rect x="705" y="280" width="220" height="150" rx="20" fill="#eef4ff" stroke="#8db0f2" stroke-width="2"/>
  <text class="body" x="735" y="320">Correctness</text>
  <text class="num" x="735" y="370">50% -&gt; 88%</text>
  <text class="body" x="735" y="402">Average answer accuracy</text>

  <rect x="955" y="280" width="220" height="150" rx="20" fill="#ecfff6" stroke="#7fd2aa" stroke-width="2"/>
  <text class="body" x="985" y="320">Token efficiency</text>
  <text class="num" x="985" y="370">-58% to -74%</text>
  <text class="body" x="985" y="402">Claude token reduction</text>

  <rect x="705" y="465" width="220" height="150" rx="20" fill="#fff4e8" stroke="#f0b67e" stroke-width="2"/>
  <text class="body" x="735" y="505">Dead ends</text>
  <text class="num" x="735" y="555">2-3/repo -&gt; 0</text>
  <text class="body" x="735" y="587">Claude under structured routing</text>

  <rect x="955" y="465" width="220" height="150" rx="20" fill="#f2fbf8" stroke="#74c59f" stroke-width="2"/>
  <text class="body" x="985" y="505">Risk flags</text>
  <text class="num" x="985" y="555">7 -&gt; 0</text>
  <text class="body" x="985" y="587">Production-breaking answers eliminated</text>

  <text class="body" x="705" y="670">Takeaway:</text>
  <text class="body" x="705" y="702">Even with non-monotonic harness effects, the aggregate direction is clear:</text>
  <text class="body" x="705" y="730">better navigation meaningfully improved correctness, reduced wasted work,</text>
  <text class="body" x="705" y="758">and removed the highest-risk outputs across repos.</text>
</svg>
