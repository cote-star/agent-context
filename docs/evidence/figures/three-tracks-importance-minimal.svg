<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Explorable Recall as a Three-Track System</title>
  <desc id="desc">A minimal flow diagram showing Navigation, Operating Loop, and Engineering as three distinct tracks feeding into Explorable Recall, with concrete examples for each track and Navigation marked as the underweighted control surface.</desc>

  <rect width="1200" height="700" fill="#ffffff"/>

  <text x="70" y="80" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#111111">
    Explorable Recall as a Three-Track System
  </text>
  <text x="70" y="114" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#444444">
    Navigation decides what loads: read order, risky paths, and stop conditions.
  </text>
  <text x="70" y="138" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#444444">
    Operating loop decides how it gets consumed. Engineering keeps it durable through manifests, provenance, and acceptance tests.
  </text>

  <line x1="70" y1="158" x2="1130" y2="158" stroke="#d0d0d0" stroke-width="2"/>

  <rect x="70" y="193" width="320" height="250" rx="8" fill="#ffffff" stroke="#9aa5b1" stroke-width="3"/>
  <rect x="440" y="193" width="320" height="250" rx="8" fill="#ffffff" stroke="#cfcfcf" stroke-width="2"/>
  <rect x="810" y="193" width="320" height="250" rx="8" fill="#ffffff" stroke="#cfcfcf" stroke-width="2"/>

  <text x="230" y="238" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#111111">
    Navigation
  </text>
  <text x="600" y="238" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#111111">
    Operating Loop
  </text>
  <text x="970" y="238" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#111111">
    Engineering
  </text>

  <text x="230" y="276" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#4b5563">
    CONTROL SURFACE
  </text>
  <text x="600" y="276" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#4b5563">
    OPERATING LOOP
  </text>
  <text x="970" y="276" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#4b5563">
    SYSTEMS LAYER
  </text>

  <line x1="110" y1="296" x2="350" y2="296" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="480" y1="296" x2="720" y2="296" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="850" y1="296" x2="1090" y2="296" stroke="#e5e7eb" stroke-width="2"/>

  <text x="230" y="343" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">
    What should load,
  </text>
  <text x="230" y="373" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">
    what should not,
  </text>
  <text x="230" y="403" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">
    and when should it stop?
  </text>
  <text x="230" y="427" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#4b5563">
    read order, risky paths, stop conditions
  </text>

  <text x="600" y="343" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">
    How does this agent
  </text>
  <text x="600" y="373" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">
    actually consume
  </text>
  <text x="600" y="403" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">
    the context?
  </text>
  <text x="600" y="427" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#4b5563">
    trust route, verify route, broaden search
  </text>

  <text x="970" y="343" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">
    What makes prior work
  </text>
  <text x="970" y="373" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">
    durable, inspectable,
  </text>
  <text x="970" y="403" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#111111">
    and reusable?
  </text>
  <text x="970" y="427" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#4b5563">
    manifests, provenance, acceptance tests
  </text>

  <line x1="230" y1="443" x2="470" y2="528" stroke="#bcbcbc" stroke-width="3"/>
  <line x1="600" y1="443" x2="600" y2="528" stroke="#bcbcbc" stroke-width="3"/>
  <line x1="970" y1="443" x2="730" y2="528" stroke="#bcbcbc" stroke-width="3"/>

  <rect x="340" y="528" width="520" height="100" rx="10" fill="#fafafa" stroke="#cfcfcf" stroke-width="2"/>
  <text x="600" y="570" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#111111">
    Explorable Recall
  </text>
  <text x="600" y="600" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#444444">
    task-scoped retrieval with provenance, bounded loading, and a fast path to evidence
  </text>
</svg>
