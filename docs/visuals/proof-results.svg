<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">agent-context proof summary — per-agent + historical</title>
  <desc id="desc">Per-agent measured evidence for Claude, Codex, and Cursor (current rerun) above the historical 78-graded run set across three real repos. The same dual-routing pattern supports any agent that reads CLAUDE.md, AGENTS.md, GEMINI.md, or .cursorrules; measured runs only exist for these three agents today.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
    <style>
      .h1 { font: 800 44px Inter, Arial, sans-serif; fill: #111827; }
      .body { font: 21px Inter, Arial, sans-serif; fill: #475569; }
      .eyebrow { font: 800 18px Inter, Arial, sans-serif; fill: #9A3412; letter-spacing: 0; }
      .eyebrowL { font: 800 18px Inter, Arial, sans-serif; fill: #FDE68A; letter-spacing: 0; }
      .metric { font: 900 58px Inter, Arial, sans-serif; fill: #111827; }
      .metricL { font: 900 58px Inter, Arial, sans-serif; fill: #FDFCF8; }
      .label { font: 800 22px Inter, Arial, sans-serif; fill: #111827; }
      .labelL { font: 800 22px Inter, Arial, sans-serif; fill: #FDFCF8; }
      .small { font: 16px Inter, Arial, sans-serif; fill: #64748B; }
      .smallL { font: 16px Inter, Arial, sans-serif; fill: #CBD5E1; }
      .mono { font: 17px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #475569; }
      .monoDark { font: 17px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #CBD5E1; }
    </style>
  </defs>
  <rect width="1400" height="900" fill="#FDFCF8"/>
  <rect x="58" y="54" width="1284" height="792" rx="8" fill="#FFF7E8" stroke="#E8D9BE"/>
  <text class="h1" x="108" y="126">Per-agent evidence + 78-graded historical set</text>
  <text class="body" x="110" y="166">Three measured agents today (Claude, Codex, Cursor). The same dual-routing pattern</text>
  <text class="body" x="110" y="196">supports any agent reading CLAUDE.md / AGENTS.md / GEMINI.md / .cursorrules.</text>

  <g filter="url(#shadow)">
    <rect x="108" y="234" width="386" height="222" rx="8" fill="#111827"/>
    <text class="eyebrowL" x="140" y="276">CLAUDE · 3-repo measured</text>
    <text class="metricL" x="140" y="358">~70%</text>
    <text class="labelL" x="140" y="394">fewer files opened</text>
    <text class="smallL" x="140" y="422">6.3 → 1.9 files / task</text>
    <text class="smallL" x="140" y="442">38.6K → 13.1K tokens / task</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="532" y="234" width="344" height="222" rx="8" fill="#FFFFFF" stroke="#E8D9BE"/>
    <text class="eyebrow" x="564" y="276">CODEX · 6-task cell rerun</text>
    <text class="metric" x="564" y="358">20%</text>
    <text class="label" x="564" y="394">fewer tokens</text>
    <text class="small" x="564" y="422">163K → 130K tokens / cell</text>
    <text class="small" x="564" y="442">12 → 6 risk flags · 7.7 → 7.1 files</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="914" y="234" width="378" height="222" rx="8" fill="#111827"/>
    <text class="eyebrowL" x="946" y="276">CURSOR · 6-task cell rerun</text>
    <text class="metricL" x="946" y="358">71%</text>
    <text class="labelL" x="946" y="394">fewer dead ends</text>
    <text class="smallL" x="946" y="422">0.24 → 0.07 dead ends / task</text>
    <text class="smallL" x="946" y="442">3.6 → 2.7 files · 14 → 10 risk flags</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="108" y="488" width="760" height="286" rx="8" fill="#FFFFFF" stroke="#E8D9BE"/>
    <text class="label" x="140" y="538">Earlier evidence: 78 reviewer-graded answers</text>
    <text class="mono" x="630" y="538">3 repos</text>

    <text x="140" y="616" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#111827">ml-pipeline-reference: 50 → 83</text>
    <rect x="502" y="586" width="140" height="18" rx="6" fill="#FCA5A5"/>
    <rect x="502" y="614" width="232" height="18" rx="6" fill="#F37021"/>

    <text x="140" y="686" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#111827">agent-chorus: 83 + 100</text>
    <rect x="502" y="664" width="232" height="18" rx="6" fill="#FCA5A5"/>
    <rect x="502" y="692" width="280" height="18" rx="6" fill="#F37021"/>

    <text x="140" y="756" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#111827">frontend: 50 → 100</text>
    <rect x="502" y="724" width="140" height="18" rx="6" fill="#FCA5A5"/>
    <rect x="502" y="752" width="280" height="18" rx="6" fill="#F37021"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="906" y="488" width="386" height="286" rx="8" fill="#111827"/>
    <text class="label" x="938" y="540" fill="#FDFCF8">What the pack does</text>
    <rect x="938" y="582" width="132" height="42" rx="6" fill="#FEF3C7"/>
    <text class="mono" x="960" y="609" fill="#7C2D12">content</text>
    <text class="monoDark" x="1110" y="609">read first</text>
    <rect x="938" y="642" width="132" height="42" rx="6" fill="#FFEDD5"/>
    <text class="mono" x="960" y="669" fill="#7C2D12">authority</text>
    <text class="monoDark" x="1110" y="669">required files</text>
    <rect x="938" y="702" width="132" height="42" rx="6" fill="#ECFDF5"/>
    <text class="mono" x="960" y="729" fill="#14532D">navigation</text>
    <text class="monoDark" x="1110" y="729">bounded search</text>
  </g>
</svg>
