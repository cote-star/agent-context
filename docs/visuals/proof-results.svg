<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Agent-context proof summary</title>
  <desc id="desc">A warm paper style proof graphic showing correctness improved from 50 percent to 88 percent, Claude tokens dropped by 58 to 74 percent, dead ends went to zero, and production risk answers went from seven to zero.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="warmPanel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFF9ED"/>
      <stop offset="1" stop-color="#F8EBCF"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#F37021"/>
    </marker>
  </defs>

  <rect width="1400" height="920" fill="#FDFCF8"/>
  <rect x="54" y="52" width="1292" height="816" rx="30" fill="url(#warmPanel)" stroke="#E6D4B5"/>

  <text x="104" y="124" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">Proof from 78+ graded agent runs</text>
  <text x="106" y="164" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">Same template. Three repo types. Reviewer-graded with grep verification.</text>

  <g filter="url(#softShadow)">
    <rect x="104" y="214" width="384" height="236" rx="18" fill="#111827"/>
    <text x="138" y="270" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">CORRECT ANSWERS</text>
    <text x="138" y="350" fill="#FDFCF8" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="900">50%</text>
    <path d="M 286 326 L 340 326" stroke="#F37021" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="360" y="350" fill="#FDFCF8" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="900">88%</text>
    <text x="138" y="402" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">Bare -> context-pack sessions</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="524" y="214" width="350" height="236" rx="18" fill="#FFFFFF" stroke="#E8D9BE"/>
    <text x="558" y="270" fill="#7C2D12" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">CLAUDE TOKEN USE</text>
    <text x="558" y="345" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900">58-74%</text>
    <text x="558" y="390" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800">fewer tokens</text>
    <text x="558" y="420" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">40-53K down to 4-22K</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="910" y="214" width="386" height="236" rx="18" fill="#FFFFFF" stroke="#E8D9BE"/>
    <text x="944" y="270" fill="#7C2D12" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">FAILURE MODES</text>
    <text x="944" y="338" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">dead ends: 0</text>
    <text x="944" y="392" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">risk flags: 7 -> 0</text>
    <text x="944" y="421" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">Structured routing removed the highest-risk outputs.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="104" y="500" width="760" height="300" rx="18" fill="#FFFFFF" stroke="#E8D9BE"/>
    <text x="138" y="550" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Correctness snapshots</text>
    <text x="642" y="550" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">observed in results.md</text>

    <text x="138" y="612" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">stream-models</text>
    <text x="138" y="636" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="16">Claude + Codex: 50% -> 83%</text>
    <rect x="500" y="596" width="140" height="18" rx="9" fill="#FCA5A5"/>
    <rect x="500" y="624" width="232" height="18" rx="9" fill="#F37021"/>
    <text x="756" y="639" fill="#111827" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">50 -> 83</text>

    <text x="138" y="692" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">agent-chorus</text>
    <text x="138" y="716" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="16">Claude held; Codex hit 6/6</text>
    <rect x="500" y="676" width="232" height="18" rx="9" fill="#FCA5A5"/>
    <rect x="500" y="704" width="280" height="18" rx="9" fill="#F37021"/>
    <text x="756" y="719" fill="#111827" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">83 + 100</text>

    <text x="138" y="772" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">trust-stream-frontend</text>
    <text x="138" y="796" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="16">Claude: 50% -> 100%; Codex: 50% -> 75%</text>
    <rect x="500" y="756" width="140" height="18" rx="9" fill="#FCA5A5"/>
    <rect x="500" y="784" width="280" height="18" rx="9" fill="#F37021"/>
    <text x="756" y="799" fill="#111827" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">50 -> 100</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="902" y="500" width="394" height="300" rx="18" fill="#111827"/>
    <text x="936" y="550" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">What changed?</text>
    <rect x="936" y="588" width="116" height="42" rx="9" fill="#FEF3C7"/>
    <text x="957" y="615" fill="#7C2D12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700">content</text>
    <rect x="936" y="648" width="128" height="42" rx="9" fill="#FFEDD5"/>
    <text x="957" y="675" fill="#7C2D12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700">authority</text>
    <rect x="936" y="708" width="142" height="42" rx="9" fill="#DCFCE7"/>
    <text x="957" y="735" fill="#14532D" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700">navigation</text>
    <text x="1118" y="615" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">read first</text>
    <text x="1118" y="675" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">required files</text>
    <text x="1118" y="735" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">bounded search</text>
  </g>
</svg>
