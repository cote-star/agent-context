<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent-context pack loop</title>
  <desc id="desc">A diagram showing a cold agent reading a checked-in context pack before making scoped code changes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F37021"/>
    </marker>
  </defs>

  <rect width="1400" height="720" fill="#FDFCF8"/>
  <rect x="70" y="70" width="1260" height="580" rx="28" fill="#FFF7E8" stroke="#E8D9BE"/>

  <text x="118" y="138" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">A warm start for every coding agent</text>
  <text x="120" y="180" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="22">The context pack is checked into the repo, verified in CI, and read before source exploration.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="255" width="275" height="230" rx="18" fill="#111827"/>
    <text x="150" y="310" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Cold agent</text>
    <text x="150" y="354" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">new session</text>
    <text x="150" y="390" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">unknown repo</text>
    <text x="150" y="426" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">high search cost</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="565" y="225" width="300" height="290" rx="18" fill="#FFFFFF" stroke="#E8D9BE"/>
    <text x="600" y="280" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">.agent-context</text>
    <rect x="600" y="320" width="230" height="40" rx="8" fill="#FEF3C7"/>
    <text x="622" y="346" fill="#7C2D12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">content markdown</text>
    <rect x="600" y="380" width="230" height="40" rx="8" fill="#FFEDD5"/>
    <text x="622" y="406" fill="#7C2D12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">authority json</text>
    <rect x="600" y="440" width="230" height="40" rx="8" fill="#DCFCE7"/>
    <text x="622" y="466" fill="#14532D" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">search scope</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1035" y="255" width="245" height="230" rx="18" fill="#FFFFFF" stroke="#E8D9BE"/>
    <text x="1070" y="310" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Scoped work</text>
    <text x="1070" y="354" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">fewer dead ends</text>
    <text x="1070" y="390" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">named risks</text>
    <text x="1070" y="426" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">verified answer</text>
  </g>

  <path d="M 405 370 C 460 370, 500 370, 545 370" fill="none" stroke="#F37021" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M 880 370 C 930 370, 970 370, 1018 370" fill="none" stroke="#F37021" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M 1160 512 C 1120 610, 810 625, 715 535" fill="none" stroke="#94A3B8" stroke-width="5" stroke-dasharray="12 14" marker-end="url(#arrow)"/>

  <text x="455" y="338" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">read first</text>
  <text x="914" y="338" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">search inside bounds</text>
  <text x="772" y="630" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="19">pack stays fresh through verification and PR review</text>
</svg>
